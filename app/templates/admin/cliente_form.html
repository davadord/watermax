{% extends "base.html" %}
{% block title %}{% if cliente %}Editar cliente{% else %}Nuevo cliente{% endif %} — Watermax{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <h4 class="mb-4">
      <i class="bi bi-person-fill text-primary"></i>
      {% if cliente %}Editar cliente{% else %}Nuevo cliente{% endif %}
    </h4>

    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="mb-3">
        <label class="form-label">Nombre <span class="text-danger">*</span></label>
        <input type="text" name="nombre" class="form-control"
               value="{{ cliente.nombre if cliente else '' }}" required maxlength="150">
      </div>

      <div class="mb-3">
        <label class="form-label">Zona <span class="text-danger">*</span></label>
        <select name="zona_id" class="form-select" required>
          <option value="">Selecciona una zona</option>
          {% for zona in zonas %}
            <option value="{{ zona.id }}"
              {% if cliente and cliente.zona_id == zona.id %}selected{% endif %}>
              {{ zona.nombre }}
            </option>
          {% endfor %}
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Teléfono</label>
        <input type="text" name="telefono" class="form-control"
               value="{{ cliente.telefono if cliente else '' }}"
               maxlength="20" pattern="[\+\d\-\s]+"
               title="Solo dígitos, espacios, guiones y + (código de país)">
      </div>

      <div class="mb-3">
        <label class="form-label">Dirección</label>
        <input type="text" name="direccion" class="form-control"
               value="{{ cliente.direccion if cliente else '' }}" maxlength="250">
      </div>

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control"
               value="{{ cliente.email if cliente else '' }}" maxlength="120"
               pattern="[^@]+@[^@]+\.[a-zA-Z]{2,}"
               title="Debe tener formato válido: usuario@dominio.com">
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-check-lg"></i> Guardar
        </button>
        <a href="{{ url_for('admin.clientes') }}" class="btn btn-outline-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
