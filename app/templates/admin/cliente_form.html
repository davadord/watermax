{% extends "base.html" %}
{% block title %}{% if cliente %}Editar cliente{% else %}Nuevo cliente{% endif %} — Watermax{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <h4 class="mb-4">
      <i class="bi bi-person-fill text-primary"></i>
      {% if cliente %}Editar cliente{% else %}Nuevo cliente{% endif %}
    </h4>

    <form method="POST" id="form-cliente">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="mb-3">
        <label class="form-label">Nombre <span class="text-danger">*</span></label>
        <input type="text" name="nombre" class="form-control"
               value="{{ cliente.nombre if cliente else '' }}" required maxlength="150">
      </div>

      <div class="row g-2 mb-3">
        <div class="col-md-4">
          <label class="form-label">Tipo de ID <span class="text-danger">*</span></label>
          <select name="tipo_identificador" id="tipo_identificador" class="form-select" required>
            <option value="">Seleccionar...</option>
            {% for tipo in tipos %}
            <option value="{{ tipo }}"
              {% if cliente and cliente.tipo_identificador == tipo %}selected
              {% endif %}>{{ tipo }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-8">
          <label class="form-label">Número de identificación <span class="text-danger">*</span></label>
          <input type="text" name="identificador" id="identificador" class="form-control"
                 value="{{ cliente.identificador if cliente else '' }}" required maxlength="30">
          <div class="form-text" id="id-hint"></div>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Teléfono</label>
        <input type="text" name="telefono" id="telefono" class="form-control"
               value="{{ cliente.telefono if cliente else '' }}"
               maxlength="20" pattern="[\+\d\-\s]+"
               title="Solo dígitos, espacios, guiones y + (código de país)">
      </div>

      <div class="mb-3">
        <label class="form-label">Dirección</label>
        <input type="text" name="direccion" class="form-control"
               value="{{ cliente.direccion if cliente else '' }}" maxlength="250">
      </div>

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control"
               value="{{ cliente.email if cliente else '' }}" maxlength="120"
               pattern="[^@]+@[^@]+\.[a-zA-Z]{2,}"
               title="Debe tener formato válido: usuario@dominio.com">
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-check-lg"></i> Guardar
        </button>
        <a href="{{ url_for('admin.clientes') }}" class="btn btn-outline-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const tipoSelect    = document.getElementById('tipo_identificador');
const idInput       = document.getElementById('identificador');
const telefonoInput = document.getElementById('telefono');
const hint          = document.getElementById('id-hint');

const hints = {
  'Cédula':    '10 dígitos numéricos',
  'RUC':       '13 dígitos numéricos',
  'Pasaporte': 'Alfanumérico libre',
  'Otro':      'Se generará un código automático si el campo está vacío',
};

tipoSelect.addEventListener('change', function () {
  hint.textContent = hints[this.value] || '';
  if (this.value === 'Otro' && !idInput.value) sugerirCodigo();
});

telefonoInput.addEventListener('blur', function () {
  if (tipoSelect.value === 'Otro' && !idInput.value) sugerirCodigo();
});

function sugerirCodigo() {
  fetch(`{{ url_for('admin.sugerir_codigo_otro') }}?telefono=${encodeURIComponent(telefonoInput.value)}`)
    .then(r => r.json())
    .then(data => { if (!idInput.value) idInput.value = data.codigo; });
}
</script>
{% endblock %}
