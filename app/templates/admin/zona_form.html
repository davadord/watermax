{% extends "base.html" %}
{% block title %}{% if zona %}Editar zona{% else %}Nueva zona{% endif %} — Watermax{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <h4 class="mb-4">
      <i class="bi bi-geo-alt-fill text-primary"></i>
      {% if zona %}Editar zona{% else %}Nueva zona{% endif %}
    </h4>

    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="mb-3">
        <label class="form-label">Nombre <span class="text-danger">*</span></label>
        <input type="text" name="nombre" class="form-control"
               value="{{ zona.nombre if zona else '' }}" required maxlength="80">
      </div>

      <div class="mb-3">
        <label class="form-label">Descripción</label>
        <input type="text" name="descripcion" class="form-control"
               value="{{ zona.descripcion if zona else '' }}" maxlength="200">
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-check-lg"></i> Guardar
        </button>
        <a href="{{ url_for('admin.zonas') }}" class="btn btn-outline-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
