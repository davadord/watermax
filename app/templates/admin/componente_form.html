{% extends "base.html" %}
{% block title %}{% if componente %}Editar componente{% else %}Nuevo componente{% endif %} — Watermax{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <h4 class="mb-4">
      <i class="bi bi-tools text-primary"></i>
      {% if componente %}Editar componente{% else %}Nuevo componente{% endif %}
    </h4>

    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="mb-3">
        <label class="form-label">Nombre <span class="text-danger">*</span></label>
        <input type="text" name="nombre" class="form-control"
               value="{{ componente.nombre if componente else '' }}" required maxlength="100">
      </div>

      <div class="mb-3">
        <label class="form-label">Descripción</label>
        <input type="text" name="descripcion" class="form-control"
               value="{{ componente.descripcion if componente else '' }}" maxlength="200">
      </div>

      <div class="mb-3">
        <label class="form-label">Intervalo nominal (meses) <span class="text-danger">*</span></label>
        <input type="number" name="intervalo_nominal" class="form-control"
               value="{{ componente.intervalo_nominal if componente else '' }}" required min="1" max="120">
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-check-lg"></i> Guardar
        </button>
        <a href="{{ url_for('admin.componentes') }}" class="btn btn-outline-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
