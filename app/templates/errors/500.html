{% extends "base.html" %}
{% block title %}Error interno — Watermax{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-6 text-center">
    <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size: 4rem;"></i>
    <h1 class="h3 mt-3 fw-bold">Error interno del servidor</h1>
    <p class="text-muted">
      Ocurrió un error inesperado. El equipo técnico ha sido notificado.<br>
      Si el problema persiste, contacta al administrador del sistema.
    </p>
    <a href="{{ url_for('reports.dashboard') }}" class="btn btn-primary mt-2">
      <i class="bi bi-house-fill"></i> Ir al dashboard
    </a>
  </div>
</div>
{% endblock %}
