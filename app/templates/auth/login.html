{% extends "base.html" %}
{% block title %}Iniciar sesión — Watermax{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-sm-10 col-md-6 col-lg-4">
    <div class="text-center mt-5 mb-4">
      <i class="bi bi-droplet-fill text-primary" style="font-size: 2.5rem;"></i>
      <h1 class="h4 fw-bold mt-2 mb-0">Watermax</h1>
      <p class="text-muted small mb-0">Gestión de mantenimiento preventivo</p>
    </div>

    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h2 class="h5 mb-3">Iniciar sesión</h2>
        <form method="POST" action="{{ url_for('auth.login') }}" novalidate>
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

          <div class="mb-3">
            <label class="form-label" for="email">Correo electrónico</label>
            <input type="email" id="email" name="email" class="form-control"
                   required autofocus autocomplete="username"
                   placeholder="nombre@empresa.com">
          </div>

          <div class="mb-3">
            <label class="form-label d-flex justify-content-between align-items-center" for="password">
              <span>Contraseña</span>
            </label>
            <div class="input-group">
              <input type="password" id="password" name="password" class="form-control"
                     required autocomplete="current-password">
              <button type="button" class="btn btn-outline-secondary"
                      data-toggle-password="#password"
                      data-bs-toggle="tooltip" title="Mostrar / ocultar contraseña">
                <i class="bi bi-eye"></i>
              </button>
            </div>
          </div>

          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-box-arrow-in-right"></i> Ingresar
          </button>
        </form>
      </div>
    </div>

    <p class="text-center text-muted small mt-3">
      ¿Problemas para acceder? Contacta al administrador del sistema.
    </p>
  </div>
</div>
{% endblock %}
