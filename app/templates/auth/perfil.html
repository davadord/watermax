{% extends "base.html" %}
{% block title %}Mi perfil — Watermax{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-sm-10 col-md-6 col-lg-4">
    <h1 class="h4 fw-bold mb-4">Mi perfil</h1>

    <div class="card shadow-sm mb-4">
      <div class="card-body p-4">
        <div class="fw-semibold">{{ current_user.nombre }}</div>
        <div class="text-muted small">{{ current_user.email }}</div>
        <div class="text-muted small">{{ current_user.rol|capitalize }}</div>
      </div>
    </div>

    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h2 class="h5 mb-3">Cambiar contraseña</h2>
        <form method="POST" action="{{ url_for('auth.perfil') }}" novalidate>
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

          <div class="mb-3">
            <label class="form-label" for="password_actual">Contraseña actual</label>
            <input type="password" id="password_actual" name="password_actual" class="form-control"
                   required autocomplete="current-password">
          </div>

          <div class="mb-3">
            <label class="form-label" for="password_nueva">Nueva contraseña</label>
            <input type="password" id="password_nueva" name="password_nueva" class="form-control"
                   required minlength="8" autocomplete="new-password">
          </div>

          <div class="mb-3">
            <label class="form-label" for="password_confirmar">Confirmar nueva contraseña</label>
            <input type="password" id="password_confirmar" name="password_confirmar" class="form-control"
                   required minlength="8" autocomplete="new-password">
          </div>

          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-key-fill"></i> Actualizar contraseña
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
